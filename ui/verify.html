<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNMAPPED — Skill Card Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:           #07080f;
      --s1:           #0c0e1a;
      --s2:           #101221;
      --s3:           #161829;
      --border:       #1a1d2e;
      --border-hi:    #252840;
      --primary:      #6f63ff;
      --primary-dim:  #3d3799;
      --primary-glow: rgba(111,99,255,.12);
      --green:        #10d9a0;
      --green-bg:     rgba(16,217,160,.08);
      --amber:        #f5a623;
      --amber-bg:     rgba(245,166,35,.08);
      --red:          #ff5f6e;
      --red-bg:       rgba(255,95,110,.08);
      --blue:         #4d9eff;
      --t1:           #eef0f8;
      --t2:           #7b85a8;
      --t3:           #3a3f58;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,8,15,.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-size: 15px; font-weight: 900;
      letter-spacing: 4px; color: var(--primary);
      text-decoration: none;
    }
    .portal-badge {
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.5px; color: var(--t2);
      border: 1px solid var(--border-hi);
      border-radius: 20px;
      padding: 4px 12px;
      text-transform: uppercase;
    }

    /* ─── PAGE LAYOUT ───────────────────────────────── */
    .page {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ─── LOADING / NOT FOUND ───────────────────────── */
    .state-center {
      text-align: center;
      padding: 80px 20px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--s3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-title { font-size: 18px; font-weight: 700; color: var(--t1); margin-bottom: 8px; }
    .state-sub   { font-size: 14px; color: var(--t2); line-height: 1.6; }
    .state-id    { font-family: monospace; font-size: 12px; color: var(--t3); margin-top: 10px; }
    .back-link {
      display: inline-block; margin-top: 24px;
      font-size: 13px; color: var(--primary);
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    /* ─── CARD ──────────────────────────────────────── */
    .card {
      background: var(--s1);
      border: 1px solid var(--border-hi);
      border-radius: 16px;
      overflow: hidden;
    }

    /* Card header */
    .card-header {
      background: linear-gradient(135deg, #1a1540 0%, #0f0d2a 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 28px 24px;
    }
    .card-eyebrow {
      font-size: 9px; font-weight: 700;
      letter-spacing: 2.5px; color: var(--primary);
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .card-occupation {
      font-size: 22px; font-weight: 800;
      color: var(--t1); line-height: 1.2;
    }
    .card-isco {
      font-size: 12px; color: var(--t2);
      margin-top: 6px; font-weight: 500;
    }
    .score-bubble {
      flex-shrink: 0;
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid var(--primary-dim);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(111,99,255,.1);
    }
    .score-num   { font-size: 26px; font-weight: 900; line-height: 1; }
    .score-label { font-size: 8px; font-weight: 700; letter-spacing: 1px; color: var(--t2); margin-top: 2px; }

    /* Verified strip */
    .verified-strip {
      background: rgba(16,217,160,.06);
      border-bottom: 1px solid rgba(16,217,160,.15);
      padding: 12px 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .verified-left { display: flex; align-items: center; gap: 10px; }
    .check-circle {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .verified-text { font-size: 12px; font-weight: 800; color: var(--green); letter-spacing: .5px; }
    .verified-sub  { font-size: 10px; color: rgba(16,217,160,.5); margin-top: 2px; }
    .profile-id-wrap { text-align: right; }
    .profile-id-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--t3); margin-bottom: 3px; }
    .profile-id-val   { font-size: 11px; font-family: monospace; color: var(--green); }

    /* Sections */
    .section {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .section:last-of-type { border-bottom: none; }
    .section-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 2px; color: var(--t3);
      text-transform: uppercase; margin-bottom: 14px;
    }

    /* Dimension rows */
    .dim-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .dim-row:last-child { border-bottom: none; }
    .dim-name  { font-size: 13px; font-weight: 500; color: var(--t1); flex: 1; }
    .dim-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .dim-score { font-size: 12px; color: var(--t2); min-width: 42px; text-align: right; }
    .bar-track { width: 72px; height: 4px; background: var(--s3); border-radius: 2px; }
    .bar-fill  { height: 4px; border-radius: 2px; transition: width .4s ease; }
    .tier-pill {
      font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      min-width: 74px; text-align: center;
    }

    /* Employer signal */
    .signal-box {
      background: var(--s2);
      border-left: 3px solid var(--primary);
      border-radius: 6px;
      padding: 14px 16px;
      font-size: 13px; font-style: italic;
      color: var(--t1); line-height: 1.65;
    }

    /* Transferable tags */
    .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 600;
      padding: 4px 11px;
      background: var(--s2);
      border: 1px solid var(--border-hi);
      border-radius: 20px;
      color: var(--t2);
    }

    /* Card footer */
    .card-footer {
      background: var(--s2);
      border-top: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-meta  { font-size: 10px; color: var(--t3); line-height: 1.7; }
    .footer-right { font-size: 10px; color: var(--t3); text-align: right; line-height: 1.7; }

    /* Actions */
    .actions {
      margin-top: 16px;
      display: flex; gap: 10px;
    }
    .btn-print {
      flex: 1;
      padding: 12px 20px;
      background: var(--s1);
      border: 1px solid var(--border-hi);
      color: var(--t2);
      border-radius: 10px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-print:hover { border-color: var(--primary); color: var(--t1); }

    /* Disclaimer */
    .disclaimer {
      margin-top: 20px;
      font-size: 11px; color: var(--t3);
      text-align: center; line-height: 1.7;
    }

    /* ─── PRINT ─────────────────────────────────────── */
    @media print {
      body { background: white; }
      header, .actions, .disclaimer { display: none; }
      .card { border-color: #ddd; max-width: 100%; }
      .card-header { background: #1a1060; }
      .verified-strip { background: #f0fdf4; border-color: #bbf7d0; }
      .section { border-color: #e2e8f0; }
      .dim-row { border-color: #f1f5f9; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">UNMAPPED</a>
  <div class="portal-badge">Employer Verification</div>
</header>

<div class="page">
  <div id="content">
    <div class="state-center">
      <div class="spinner"></div>
      <div class="state-sub">Verifying skill card...</div>
    </div>
  </div>
</div>

<script>
  const API = '';

  function scoreColor(s) {
    if (s >= 70) return 'var(--green)';
    if (s >= 45) return 'var(--amber)';
    return 'var(--red)';
  }

  function scoreHex(s) {
    if (s >= 70) return '#10d9a0';
    if (s >= 45) return '#f5a623';
    return '#ff5f6e';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso + (iso.includes('Z') ? '' : 'Z'));
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
           + ' · ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' UTC';
    } catch { return iso; }
  }

  function renderCard(p) {
    const sc     = scoreColor(p.overall_score);
    const scHex  = scoreHex(p.overall_score);

    const dims = (p.dimensions || []).map(d => {
      const dc  = scoreHex(d.score);
      const tc  = d.tier_color || dc;
      return `
        <div class="dim-row">
          <div class="dim-name">${d.label}</div>
          <div class="dim-right">
            <div class="dim-score">${d.score}/100</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${d.score}%; background:${dc};"></div>
            </div>
            <div class="tier-pill" style="background:${tc}18; color:${tc}; border:1px solid ${tc}35;">
              ${d.tier_label}
            </div>
          </div>
        </div>`;
    }).join('');

    const tags = (p.transferable_to || []).map(t =>
      `<span class="tag">${t}</span>`
    ).join('');

    document.getElementById('content').innerHTML = `
      <div class="card">

        <!-- Header -->
        <div class="card-header">
          <div class="card-eyebrow">UNMAPPED · Verified Skills Card</div>
          <div class="card-header-row">
            <div>
              <div class="card-occupation">${p.occupation_title}</div>
              <div class="card-isco">ISCO-08 ${p.isco_code} &nbsp;·&nbsp; ${p.region}</div>
            </div>
            <div class="score-bubble" style="border-color:${scHex}55; background:${scHex}12;">
              <div class="score-num" style="color:${scHex};">${p.overall_score}</div>
              <div class="score-label">OVERALL</div>
            </div>
          </div>
        </div>

        <!-- Verified strip -->
        <div class="verified-strip">
          <div class="verified-left">
            <div class="check-circle">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M2 6.5L5 9.5L11 3.5" stroke="#07080f" stroke-width="2.2"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div>
              <div class="verified-text">UNMAPPED VERIFIED</div>
              <div class="verified-sub">Assessed ${formatDate(p.verified_at)}</div>
            </div>
          </div>
          <div class="profile-id-wrap">
            <div class="profile-id-label">PROFILE ID</div>
            <div class="profile-id-val">${p.profile_id}</div>
          </div>
        </div>

        <!-- Skill Dimensions -->
        <div class="section">
          <div class="section-label">Skill Dimensions</div>
          ${dims || '<div style="color:var(--t3); font-size:13px;">No dimension data available.</div>'}
        </div>

        <!-- Employer Signal -->
        ${p.employer_signal ? `
        <div class="section">
          <div class="section-label">Employer Signal</div>
          <div class="signal-box">${p.employer_signal}</div>
        </div>` : ''}

        <!-- Transferable To -->
        ${tags ? `
        <div class="section">
          <div class="section-label">Transferable To</div>
          <div class="tag-row">${tags}</div>
        </div>` : ''}

        <!-- Footer -->
        <div class="card-footer">
          <div class="footer-meta">
            Taxonomy: ${p.taxonomy || 'ISCO-08 / O*NET / ESCO v1.2.1'}<br>
            Issued by: ${p.issued_by || 'UNMAPPED Skills Infrastructure v1.0'}
          </div>
          <div class="footer-right">
            Verify at:<br>
            unmapped.io/card/${p.profile_id}
          </div>
        </div>

      </div>

      <div class="actions">
        <button class="btn-print" onclick="window.print()">↓ &nbsp;Print / Save as PDF</button>
      </div>

      <div class="disclaimer">
        This card was generated by a live, adaptive skills assessment. The score reflects demonstrated
        performance across standardised work tasks — not self-reported claims.<br>
        <span style="font-family:monospace; color:var(--t3);">${p.profile_id}</span>
        is the unique verification reference for this assessment.
      </div>`;
  }

  function renderNotFound(profileId) {
    document.getElementById('content').innerHTML = `
      <div class="state-center">
        <div style="font-size:36px; margin-bottom:18px;">🔍</div>
        <div class="state-title">Profile not found</div>
        <div class="state-sub">
          This profile ID doesn't match any completed assessment.<br>
          Check the ID is correct and the assessment was fully completed.
        </div>
        <div class="state-id">Searched: ${profileId}</div>
        <a class="back-link" href="/">← Worker Assessment Portal</a>
      </div>`;
  }

  async function load() {
    const parts     = window.location.pathname.split('/');
    const profileId = parts[parts.length - 1];

    if (!profileId) { renderNotFound('(none)'); return; }

    try {
      const res = await fetch(`${API}/verify/${profileId}`);
      if (res.status === 404) { renderNotFound(profileId); return; }
      if (!res.ok) throw new Error('Server error');
      renderCard(await res.json());
    } catch {
      document.getElementById('content').innerHTML = `
        <div class="state-center">
          <div class="state-title">Verification unavailable</div>
          <div class="state-sub">Could not connect to the verification service.<br>Please try again in a moment.</div>
        </div>`;
    }
  }

  load();
</script>
</body>
</html>
